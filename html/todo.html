<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #ff2088, #db197a);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: rgba(255, 255, 255, 0.553);
            padding: 20px;
            border-radius: 15px;
            width: 350px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        h2 {
            text-align: center;
        }
        .input-box {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
        }
        button {
            padding: 10px 15px;
            border: none;
            background: #ea668e;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }
        button:hover {
            background: #5a67d8;
        }
        ul {
            list-style: none;
            padding: 0;
        }
        li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            margin-bottom: 8px;
            background: #f1f1f1;
            border-radius: 8px;
        }
        li.completed {
            text-decoration: line-through;
            color: gray;
        }

        .delete-btn {
            background: red;
            border: none;
            color: white;
            padding: 5px 8px;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>To-Do App</h2>
    <div class="input-box">
        <input type="text" id="taskInput" placeholder="Enter a task to do ">
        <button onclick="addTask()">Add</button>
    </div>
    <ul id="taskList"></ul>
</div>
<script>
    function addTask() {
        let input = document.getElementById("taskInput");
        let taskText = input.value.trim();

        if (taskText === "") {
            alert("Please enter a task");
            return;
        }
        let li = document.createElement("li");
        li.innerHTML = `
            <span onclick="toggleTask(this)">${taskText}</span>
            <button class="delete-btn" onclick="deleteTask(this)">X</button>
        `;
        document.getElementById("taskList").appendChild(li);
        input.value = "";
    }
    function deleteTask(btn) {
        btn.parentElement.remove();
    }
    function toggleTask(task) {
        task.parentElement.classList.toggle("completed");
    }
</script>
</body>
</html>
